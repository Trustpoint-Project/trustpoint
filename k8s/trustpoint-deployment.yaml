apiVersion: apps/v1
kind: Deployment
metadata:
  name: trustpoint
  namespace: trustpoint
  labels:
    app: trustpoint
spec:
  replicas: 2
  selector:
    matchLabels:
      app: trustpoint
  template:
    metadata:
      labels:
        app: trustpoint
    spec:
      initContainers:
      # Wait for PostgreSQL to be ready
      - name: wait-for-postgres
        image: busybox:1.36
        command:
        - sh
        - -c
        - |
          until nc -z postgres 5432; do
            echo "Waiting for PostgreSQL..."
            sleep 2
          done
          echo "PostgreSQL is ready!"
      containers:
      - name: trustpoint
        image: trustpointproject/trustpoint:latest
        ports:
        - containerPort: 80
          name: http
        - containerPort: 443
          name: https
        envFrom:
        - configMapRef:
            name: trustpoint-config
        env:
        - name: DATABASE_USER
          valueFrom:
            secretKeyRef:
              name: trustpoint-secrets
              key: DATABASE_USER
        - name: DATABASE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: trustpoint-secrets
              key: DATABASE_PASSWORD
        livenessProbe:
          httpGet:
            path: /
            port: 443
            scheme: HTTPS
          initialDelaySeconds: 90
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: 443
            scheme: HTTPS
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 10
          failureThreshold: 3
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
