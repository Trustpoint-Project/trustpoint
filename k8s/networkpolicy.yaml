---
# Network policy for Trustpoint application
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: trustpoint-netpol
  namespace: trustpoint
spec:
  podSelector:
    matchLabels:
      app: trustpoint
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # Allow incoming traffic on HTTP and HTTPS
  - from:
    - podSelector: {}  # Allow from all pods in namespace
    - namespaceSelector: {}  # Allow from ingress controller
    ports:
    - protocol: TCP
      port: 80
    - protocol: TCP
      port: 443
  egress:
  # Allow DNS
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: UDP
      port: 53
  # Allow PostgreSQL
  - to:
    - podSelector:
        matchLabels:
          app: postgres
    ports:
    - protocol: TCP
      port: 5432
  # Allow external HTTPS (for updates, external APIs)
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 443

---
# Network policy for PostgreSQL
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: postgres-netpol
  namespace: trustpoint
spec:
  podSelector:
    matchLabels:
      app: postgres
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # Only allow from Trustpoint pods
  - from:
    - podSelector:
        matchLabels:
          app: trustpoint
    - podSelector:
        matchLabels:
          app: trustpoint-worker
    ports:
    - protocol: TCP
      port: 5432
  egress:
  # Allow DNS
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: UDP
      port: 53
