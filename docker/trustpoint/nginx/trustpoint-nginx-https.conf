# HTTP server (CMP and CRLs only, everything else is redirected to HTTPS)
server {
    listen 80;
    server_name localhost;

	proxy_set_header Host $http_host;
	proxy_set_header X-Forwarded-Host $http_host;
	proxy_set_header X-Forwarded-Proto $scheme;
	proxy_set_header X-Forwarded-Port $server_port;

    proxy_set_header SSL-Client-Cert "";
    proxy_set_header X-SSL-Client-Verify "NONE";
    proxy_set_header X-SSL-Client-S-DN "";
        
    client_max_body_size 10M;

    location /crl/ {
        proxy_pass http://127.0.0.1:8000;
    }

    location /.well-known/cmp/ {
        proxy_pass http://127.0.0.1:8000;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl;
    http2 on;
    server_name localhost;

    ssl_certificate     /etc/trustpoint/tls/nginx-tls-server-cert.pem;
    ssl_certificate_key /etc/trustpoint/tls/nginx-tls-server-key.key;
    ssl_trusted_certificate /etc/trustpoint/tls/nginx-tls-server-cert-chain.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-SHA384:ECDHE-RSA-AES256-SHA384:ECDHE-ECDSA-AES128-SHA256:ECDHE-RSA-AES128-SHA256;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    # Client certificates
    ssl_verify_client optional_no_ca;
    ssl_verify_depth 2;

    # Static files
    location /static/ {
        alias /var/www/html/trustpoint/trustpoint/collected_static/;
    }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $http_host;
        proxy_set_header SSL-Client-Cert $ssl_client_escaped_cert;
        proxy_set_header X-SSL-Client-Verify $ssl_client_verify;
        proxy_set_header X-SSL-Client-S-DN $ssl_client_s_dn;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        client_max_body_size 10M;
    }
}
