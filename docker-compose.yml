services:
  trustpoint:
    build:
      context: .
      dockerfile: docker/trustpoint/Dockerfile
    image: trustpointproject/trustpoint:latest
    container_name: trustpoint
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-trustpoint_db}"
      DATABASE_USER: "${DATABASE_USER:?DATABASE_USER env var must be set}"
      DATABASE_PASSWORD: "${DATABASE_PASSWORD:?DATABASE_PASSWORD env var must be set}"
      DATABASE_HOST: "postgres"
      DATABASE_PORT: "5432"
      TP_URLS: ${TP_URLS}
    healthcheck:
      test: ["CMD-SHELL", "curl -fsk --max-time 5 https://localhost/ > /dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    
  trustpoint-worker:
    build:
      context: .
      dockerfile: docker/trustpoint/Dockerfile
    image: trustpointproject/trustpoint:latest
    restart: on-failure
    depends_on:
      postgres:
        condition: service_healthy
      trustpoint:
        condition: service_healthy
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-trustpoint_db}"
      DATABASE_USER: "${DATABASE_USER:?DATABASE_USER env var must be set}"
      DATABASE_PASSWORD: "${DATABASE_PASSWORD:?DATABASE_PASSWORD env var must be set}"
      DATABASE_HOST: "postgres"
      DATABASE_PORT: "5432"
      TRUSTPOINT_SERVICE_ROLE: "worker"

  postgres:
    build:
      context: .
      dockerfile: docker/db/Dockerfile
    image: trustpointproject/postgres:latest
    container_name: postgres
    restart: unless-stopped
    ports:
      # Bind to loopback only – PostgreSQL must not be reachable from the network.
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    environment:
      POSTGRES_USER: "${DATABASE_USER:?DATABASE_USER env var must be set}"
      POSTGRES_PASSWORD: "${DATABASE_PASSWORD:?DATABASE_PASSWORD env var must be set}"
      POSTGRES_DB: "${POSTGRES_DB:-trustpoint_db}"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 5432"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data: