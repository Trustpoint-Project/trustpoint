name: Generate SBOM for Trustpoint

on:
  push:
    branches:
      - main
  workflow_dispatch:
  pull_request:
    types:
      - reopened
      - ready_for_review
      - synchronize

jobs:
  sbom:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout Trustpoint repo
        uses: actions/checkout@v7

      - name: Install Syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh \
            | sh -s -- -b /usr/local/bin v1.42.1
          syft version

      - name: Build Trustpoint Docker image
        run: |
          docker build -t trustpoint:latest -f docker/trustpoint/Dockerfile .

      - name: Generate SBOMs
        run: |
          mkdir -p sbom
          syft docker:trustpoint:latest -o cyclonedx-json=sbom/sbom_cyclonedx.json
          syft docker:trustpoint:latest -o spdx-json=sbom/sbom_spdx.json
          ls -lah sbom
          test -s sbom/sbom_cyclonedx.json
          test -s sbom/sbom_spdx.json

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v7
        with:
          name: trustpoint-sbom
          path: sbom/*.json
          if-no-files-found: error
          retention-days: 30
