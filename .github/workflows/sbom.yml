```yaml
name: Generate and Publish SBOMs

on:
  push:
    branches:
      - main
  workflow_dispatch:
  release:
    types:
      - published

permissions:
  contents: write

concurrency:
  group: gh-pages
  cancel-in-progress: false

jobs:
  sbom:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Trustpoint repo
        uses: actions/checkout@v4

      - name: Install Syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh \
            | sh -s -- -b /usr/local/bin v1.42.1
          syft version

      - name: Build Trustpoint Docker image
        run: |
          docker build -t trustpoint:latest -f docker/trustpoint/Dockerfile .

      - name: Determine SBOM version
        id: sbom_version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            VERSION="${{ github.event.release.tag_name }}"
          else
            VERSION="${{ github.ref_name }}"
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Generate SBOMs for GitHub Pages
        run: |
          VERSION="${{ steps.sbom_version.outputs.version }}"

          mkdir -p public/sbom/latest
          mkdir -p "public/sbom/${VERSION}"

          syft docker:trustpoint:latest \
            -o cyclonedx-json=public/sbom/latest/trustpoint.cyclonedx.json

          syft docker:trustpoint:latest \
            -o spdx-json=public/sbom/latest/trustpoint.spdx.json

          cp public/sbom/latest/trustpoint.cyclonedx.json \
            "public/sbom/${VERSION}/trustpoint-${VERSION}.cyclonedx.json"

          cp public/sbom/latest/trustpoint.spdx.json \
            "public/sbom/${VERSION}/trustpoint-${VERSION}.spdx.json"

          test -s public/sbom/latest/trustpoint.cyclonedx.json
          test -s public/sbom/latest/trustpoint.spdx.json
          test -s "public/sbom/${VERSION}/trustpoint-${VERSION}.cyclonedx.json"
          test -s "public/sbom/${VERSION}/trustpoint-${VERSION}.spdx.json"

      - name: Create SBOM index page
        run: |
          VERSION="${{ steps.sbom_version.outputs.version }}"

          cat > public/index.html <<EOF
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <title>Trustpoint SBOMs</title>
          </head>
          <body>
            <h1>Trustpoint Software Bill of Materials</h1>

            <p>These SBOMs are generated from the Trustpoint Docker image using Syft.</p>

            <h2>Latest</h2>
            <ul>
              <li><a href="sbom/latest/trustpoint.cyclonedx.json">CycloneDX JSON</a></li>
              <li><a href="sbom/latest/trustpoint.spdx.json">SPDX JSON</a></li>
            </ul>

            <h2>${VERSION}</h2>
            <ul>
              <li><a href="sbom/${VERSION}/trustpoint-${VERSION}.cyclonedx.json">CycloneDX JSON</a></li>
              <li><a href="sbom/${VERSION}/trustpoint-${VERSION}.spdx.json">SPDX JSON</a></li>
            </ul>
          </body>
          </html>
          EOF

      - name: Publish SBOMs to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: public
          keep_files: false
          allow_empty_commit: true
```
