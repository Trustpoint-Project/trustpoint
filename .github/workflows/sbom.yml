name: Generate and Publish SBOMs

on:
  push:
    branches:
      - main
  workflow_dispatch:
  release:
    types:
      - published

permissions:
  contents: write

concurrency:
  group: sbom-pages
  cancel-in-progress: false

jobs:
  sbom:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Trustpoint repo
        uses: actions/checkout@v7

      - name: Install Syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh \
            | sh -s -- -b /usr/local/bin v1.42.1
          syft version

      - name: Build Trustpoint Docker image
        run: |
          docker build -t trustpoint:latest -f docker/trustpoint/Dockerfile .

      - name: Generate SBOMs
        run: |
          mkdir -p generated-sbom

          syft docker:trustpoint:latest \
            -o cyclonedx-json=generated-sbom/trustpoint.cyclonedx.json

          syft docker:trustpoint:latest \
            -o spdx-json=generated-sbom/trustpoint.spdx.json

          test -s generated-sbom/trustpoint.cyclonedx.json
          test -s generated-sbom/trustpoint.spdx.json

      - name: Determine SBOM version
        id: sbom_version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            VERSION="${{ github.event.release.tag_name }}"
          else
            VERSION="${{ github.ref_name }}"
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Checkout gh-pages branch
        uses: actions/checkout@v7
        with:
          ref: gh-pages
          path: gh-pages

      - name: Copy SBOMs into gh-pages
        run: |
          VERSION="${{ steps.sbom_version.outputs.version }}"

          mkdir -p gh-pages/sbom/latest
          mkdir -p "gh-pages/sbom/${VERSION}"

          cp generated-sbom/trustpoint.cyclonedx.json \
            gh-pages/sbom/latest/trustpoint.cyclonedx.json

          cp generated-sbom/trustpoint.spdx.json \
            gh-pages/sbom/latest/trustpoint.spdx.json

          cp generated-sbom/trustpoint.cyclonedx.json \
            "gh-pages/sbom/${VERSION}/trustpoint-${VERSION}.cyclonedx.json"

          cp generated-sbom/trustpoint.spdx.json \
            "gh-pages/sbom/${VERSION}/trustpoint-${VERSION}.spdx.json"

      - name: Update SBOM index page
        run: |
          VERSION="${{ steps.sbom_version.outputs.version }}"

          cat > gh-pages/sbom/index.html <<EOF
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <title>Trustpoint SBOMs</title>
          </head>
          <body>
            <h1>Trustpoint Software Bill of Materials</h1>

            <h2>Latest</h2>
            <ul>
              <li><a href="latest/trustpoint.cyclonedx.json">CycloneDX JSON</a></li>
              <li><a href="latest/trustpoint.spdx.json">SPDX JSON</a></li>
            </ul>

            <h2>${VERSION}</h2>
            <ul>
              <li><a href="${VERSION}/trustpoint-${VERSION}.cyclonedx.json">CycloneDX JSON</a></li>
              <li><a href="${VERSION}/trustpoint-${VERSION}.spdx.json">SPDX JSON</a></li>
            </ul>

            <p>These SBOMs are generated from the Trustpoint Docker image using Syft.</p>
          </body>
          </html>
          EOF

      - name: Commit and push SBOMs to gh-pages
        working-directory: gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add sbom

          if git diff --cached --quiet; then
            echo "No SBOM changes to commit"
            exit 0
          fi

          git commit -m "Publish SBOMs for ${{ steps.sbom_version.outputs.version }}"
          git push
