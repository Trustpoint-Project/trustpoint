name: Tests / Migrations Compatibility

on:
  pull_request:
    branches:
      - main
    paths:
      - "**/migrations/**"
      - .github/workflows/test-migrations-compatibility.yml

env:
  TRUSTPOINT_OPERATIONAL_DATABASE: "sqlite"
  SECRET_KEY: "test-secret-key-for-ci"

permissions:
  contents: read

jobs:
  test-migrations:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Setup uv environment
        uses: ./.github/actions/setup-uv-action

      - name: Apply current branch migrations
        run: uv run manage.py migrate
        working-directory: trustpoint

      - name: Checkout base branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.base.sha }}

      - name: Sync dependencies for base branch
        run: uv sync --locked

      - name: Run tests with base code and new migrations
        run: uv run pytest --reuse-db
        working-directory: trustpoint
        continue-on-error: false

      - name: Verify migrations status
        run: |
          echo "✅ Migrations are compatible with base branch"
          uv run manage.py showmigrations
        working-directory: trustpoint
