name: Build and push Docker images

on: workflow_dispatch

jobs:

  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
      GITHUB_SHA: ${{ github.sha }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Extract version from pyproject.toml
        id: get_version
        run: |
          VERSION=$(grep '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          echo "version=v${VERSION}" >> $GITHUB_OUTPUT
          echo "Extracted version: v${VERSION}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Setup up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Generate Docker metadata for trustpoint
        id: meta-trustpoint
        uses: docker/metadata-action@v6
        with:
          images: ${{ secrets.DOCKER_HUB_USERNAME }}/trustpoint
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.get_version.outputs.version }}
            type=sha,format=long

      - name: Generate Docker metadata for postgres
        id: meta-postgres
        uses: docker/metadata-action@v6
        with:
          images: ${{ secrets.DOCKER_HUB_USERNAME }}/postgres
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.get_version.outputs.version }}
            type=sha,format=long

      - name: Build and push trustpoint image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/trustpoint/Dockerfile
          push: true
          tags: ${{ steps.meta-trustpoint.outputs.tags }}
          labels: ${{ steps.meta-trustpoint.outputs.labels }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_HUB_USERNAME }}/trustpoint:latest
          cache-to: type=inline

      - name: Build and push postgres image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/db/Dockerfile
          push: true
          tags: ${{ steps.meta-postgres.outputs.tags }}
          labels: ${{ steps.meta-postgres.outputs.labels }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_HUB_USERNAME }}/postgres:latest
          cache-to: type=inline
