name: Tests / Minimum Dependency Versions

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: '0 3 * * 1'

jobs:
  test-minimum-versions:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Install and setup uv
        uses: astral-sh/setup-uv@v9.0.0
        with:
          enable-cache: false  # Disable cache to ensure fresh minimal installs

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version-file: "pyproject.toml"

      - name: Generate minimum versions constraints
        run: |
          python .github/scripts/generate_minimum_versions.py > constraints.txt
          echo "Generated constraints:"
          cat constraints.txt

      - name: Install dependencies with minimum versions
        run: |
          # Install with constraints to pin to minimum versions
          uv sync --constraint constraints.txt

      - name: Verify installed versions
        run: |
          echo "Installed package versions:"
          uv pip list

      - name: Run Django system checks
        run: |
          uv run trustpoint/manage.py check --deploy

      - name: Run database migrations
        run: |
          uv run trustpoint/manage.py migrate

      - name: Run Pytest
        run: |
          mkdir -p reports
          uv run pytest \
            --md-report-flavor github \
            --md-report-color never \
            --html=reports/pytest-report.html \
            --junitxml=reports/junit-report.xml \
            trustpoint/

      - name: Display Summary in GitHub Actions
        if: always()
        run: |
          echo "# Minimum Dependency Versions Test" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "This workflow verifies that Trustpoint works with the minimum dependency versions specified in pyproject.toml" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "<details><summary>Pytest Report</summary>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          cat "md-report.md" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "</details>" >> $GITHUB_STEP_SUMMARY

      - name: Upload Test Reports
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: minimum-versions-test-reports
          path: |
            reports/
            constraints.txt

      - name: Render the report to the PR
        uses: marocchino/sticky-pull-request-comment@v3
        if: always() && github.event_name == 'pull_request'
        with:
          header: minimum-versions-test-report
          recreate: true
          path: md-report.md
