name: Tests / Minimum Dependencies

# Verify that minimum dependency versions specified in pyproject.toml work correctly
on:
  pull_request:
  push:
    branches:
      - main

jobs:
  minimum-dependencies:
    name: Test with Minimum Dependencies
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Install and setup uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Remove regular lock file
        run: rm -f uv.lock

      - name: Install minimum direct dependencies
        id: install_min_deps
        run: |
          uv sync --resolution lowest-direct
        continue-on-error: true

      - name: Show installed versions
        if: steps.install_min_deps.outcome == 'success'
        run: uv pip freeze

      - name: Run tests with minimum dependencies
        if: steps.install_min_deps.outcome == 'success'
        id: run_tests
        run: uv run pytest
        continue-on-error: true

      - name: Check for version conflicts
        if: steps.install_min_deps.outcome == 'failure'
        run: |
          echo "## ⚠️ Minimum Dependency Installation Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The minimum dependency versions specified in \`pyproject.toml\` could not be installed." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "This usually means:" >> $GITHUB_STEP_SUMMARY
          echo "- One or more minimum versions are too old and incompatible with each other" >> $GITHUB_STEP_SUMMARY
          echo "- A minimum version lacks pre-built wheels for the current Python version" >> $GITHUB_STEP_SUMMARY
          echo "- Version constraints are too restrictive" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Action Required:** Review and update the minimum versions in \`pyproject.toml\`" >> $GITHUB_STEP_SUMMARY

      - name: Comment on PR if installation failed
        if: steps.install_min_deps.outcome == 'failure' && github.event_name == 'pull_request'
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const pyproject = fs.readFileSync('pyproject.toml', 'utf8');
            const depsMatch = pyproject.match(/dependencies = \[([\s\S]*?)\]/);
            const deps = depsMatch ? depsMatch[0] : 'Could not extract dependencies';
            
            const comment = `## ⚠️ Minimum Dependency Installation Failed
            
            The minimum dependency versions specified in \`pyproject.toml\` could not be installed together.
            
            This usually means:
            - One or more minimum versions are too old and incompatible with each other
            - A minimum version is incompatible with the Python version
            - Version constraints are too restrictive
            
            ### Current Minimum Versions:
            \`\`\`toml
            ${deps}
            \`\`\`
            
            **Action Required:** Please review and update the minimum versions in \`pyproject.toml\` to compatible versions.
            
            You can test locally with:
            \`\`\`bash
            rm -f uv.lock
            uv sync --resolution lowest-direct
            \`\`\`
            `;
            
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

      - name: Check if tests passed
        if: steps.run_tests.outcome == 'failure'
        run: |
          echo "## ❌ Tests Failed with Minimum Dependencies" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "While the minimum dependencies could be installed, the tests failed." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "This indicates that the minimum versions may be too old to support all features." >> $GITHUB_STEP_SUMMARY
          exit 1

      - name: Comment on PR if tests failed
        if: steps.run_tests.outcome == 'failure' && github.event_name == 'pull_request'
        uses: actions/github-script@v9
        with:
          script: |
            const comment = `## ❌ Tests Failed with Minimum Dependencies
            
            The minimum dependency versions could be installed, but the tests failed.
            
            This indicates that while the versions are compatible with each other, they may be too old to support all features of the project.
            
            **Action Required:** Consider increasing the minimum versions in \`pyproject.toml\`.
            `;
            
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

      - name: Success message
        if: steps.install_min_deps.outcome == 'success' && steps.run_tests.outcome == 'success'
        run: |
          echo "## ✅ Minimum Dependencies Test Passed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All tests passed with the minimum dependency versions!" >> $GITHUB_STEP_SUMMARY
