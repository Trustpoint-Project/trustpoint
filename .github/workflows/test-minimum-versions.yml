name: Tests / Minimum Dependency Versions

# This workflow ensures Trustpoint is compatible with the minimum versions
# of all dependencies specified in pyproject.toml.
#
# It uses uv's --resolution=lowest-direct flag to install the lowest
# compatible versions that satisfy all dependency constraints.
#
# For example, if pyproject.toml specifies "cryptography>=46.0.1",
# this workflow will install the lowest compatible version (46.0.1 or higher
# if 46.0.1 conflicts with other dependencies).
#
# This helps catch breaking changes in dependencies early and ensures
# our version constraints are accurate.

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: '0 3 * * 1'

jobs:
  test-minimum-versions:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Install and setup uv
        uses: astral-sh/setup-uv@v9.0.0
        with:
          enable-cache: false  # Disable cache to ensure fresh minimal installs

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version-file: "pyproject.toml"

      - name: Install with minimum versions using lowest resolution
        id: install_deps
        continue-on-error: true
        run: |
          # Use uv's --resolution=lowest-direct to install the minimum compatible versions
          # This automatically resolves to the lowest versions that satisfy all constraints
          uv sync --resolution=lowest-direct --all-extras

      - name: Report installation failures
        if: steps.install_deps.outcome == 'failure'
        run: |
          echo "## ❌ Installation Failed with Minimum Versions" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The minimum dependency versions specified in pyproject.toml are incompatible with the current Python version or build environment." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "This indicates that the minimum version constraints need to be updated." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Action Required:** Review and update the minimum versions in \`pyproject.toml\`" >> $GITHUB_STEP_SUMMARY
          exit 1

      - name: Verify installed versions
        if: steps.install_deps.outcome == 'success'
        run: |
          echo "Installed package versions (should be minimum compatible versions):"
          uv pip list
          echo ""
          echo "Checking specific key packages:"
          uv pip show cryptography django django-stubs mypy

      - name: Export resolved versions for transparency
        if: steps.install_deps.outcome == 'success'
        run: |
          echo "Resolved dependency versions:" > resolved-versions.txt
          uv pip list >> resolved-versions.txt
          cat resolved-versions.txt

      - name: Validate minimum versions
        if: steps.install_deps.outcome == 'success'
        run: |
          echo "## Minimum Version Validation" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          uv run python .github/scripts/validate_minimum_versions.py | tee -a $GITHUB_STEP_SUMMARY
        continue-on-error: true  # Don't fail the workflow, just report

      - name: Run Django system checks
        if: steps.install_deps.outcome == 'success'
        run: |
          uv run trustpoint/manage.py check --deploy

      - name: Run database migrations
        if: steps.install_deps.outcome == 'success'
        run: |
          uv run trustpoint/manage.py migrate

      - name: Run Pytest
        if: steps.install_deps.outcome == 'success'
        run: |
          mkdir -p reports
          uv run pytest \
            --md-report-flavor github \
            --md-report-color never \
            --html=reports/pytest-report.html \
            --junitxml=reports/junit-report.xml \
            trustpoint/

      - name: Display Summary in GitHub Actions
        if: always() && steps.install_deps.outcome == 'success'
        run: |
          echo "# Minimum Dependency Versions Test" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "This workflow verifies that Trustpoint works with the minimum dependency versions specified in pyproject.toml" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f "md-report.md" ]; then
            echo "<details><summary>Pytest Report</summary>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            cat "md-report.md" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "</details>" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload Test Reports
        uses: actions/upload-artifact@v7
        if: always() && steps.install_deps.outcome == 'success'
        with:
          name: minimum-versions-test-reports
          path: |
            reports/
            resolved-versions.txt

      - name: Render the report to the PR
        uses: marocchino/sticky-pull-request-comment@v3
        if: always() && github.event_name == 'pull_request' && steps.install_deps.outcome == 'success' && hashFiles('md-report.md') != ''
        with:
          header: minimum-versions-test-report
          recreate: true
          path: md-report.md
