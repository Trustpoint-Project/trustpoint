name: Generate Architecture Documentation

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * 1'
  push:
    branches:
      - main
    paths:
      - 'trustpoint/**/models.py'
      - 'trustpoint/**/urls.py'
      - 'trustpoint/**/apps.py'
      - '.github/generate_architecture_docs.py'

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-docs:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          
      - name: Install uv
        uses: astral-sh/setup-uv@v9.0.0
        with:
          enable-cache: true
          
      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version-file: "pyproject.toml"
          
      - name: Install Graphviz
        run: |
          sudo apt-get update
          sudo apt-get install -y graphviz
          
      - name: Install dependencies
        run: |
          uv sync --all-groups
          
      - name: Generate architecture documentation
        run: |
          uv run python .github/generate_architecture_docs.py
          
      - name: Check for changes
        id: git-check
        run: |
          git diff --exit-code docs/source/development/architecture/generated || echo "changed=true" >> $GITHUB_OUTPUT
          
      - name: Commit and push if changed
        if: steps.git-check.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add docs/source/development/architecture/generated/
          git commit -m "docs: auto-generate architecture documentation [skip ci]"
          git push
          
      - name: Create Pull Request (if not on main)
        if: steps.git-check.outputs.changed == 'true' && github.ref != 'refs/heads/main'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "docs: auto-generate architecture documentation"
          title: "docs: Update architecture documentation"
          body: |
            This PR contains automatically generated architecture documentation.
            
            **Generated artifacts:**
            - Application dependency graph
            - Model relationship diagrams
            - URL routing map
            - Component overview
            
            The documentation was generated by `scripts/generate_architecture_docs.py`.
          branch: auto-docs/architecture-update
          delete-branch: true
