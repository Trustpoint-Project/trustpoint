name: CI/CD / Publish to GHCR

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  attestations: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Extract version from pyproject.toml
        id: get_version
        run: |
          VERSION=$(grep '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          echo "version=v${VERSION}" >> $GITHUB_OUTPUT
          echo "Extracted version: v${VERSION}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Docker metadata for trustpoint
        id: meta-trustpoint
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/trustpoint
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ steps.get_version.outputs.version }}
            type=sha,format=long
            type=ref,event=tag

      - name: Generate Docker metadata for postgres
        id: meta-postgres
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/trustpoint-postgres
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ steps.get_version.outputs.version }}
            type=sha,format=long
            type=ref,event=tag

      - name: Build and push trustpoint image
        id: push-trustpoint
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/trustpoint/Dockerfile
          push: true
          tags: ${{ steps.meta-trustpoint.outputs.tags }}
          labels: ${{ steps.meta-trustpoint.outputs.labels }}
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/trustpoint:latest
          cache-to: type=inline

      - name: Generate attestation for trustpoint
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/trustpoint
          subject-digest: ${{ steps.push-trustpoint.outputs.digest }}
          push-to-registry: true

      - name: Build and push postgres image
        id: push-postgres
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/db/Dockerfile
          push: true
          tags: ${{ steps.meta-postgres.outputs.tags }}
          labels: ${{ steps.meta-postgres.outputs.labels }}
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/trustpoint-postgres:latest
          cache-to: type=inline

      - name: Generate attestation for postgres
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/trustpoint-postgres
          subject-digest: ${{ steps.push-postgres.outputs.digest }}
          push-to-registry: true

      - name: Show published images
        run: |
          echo "✅ Published images to GitHub Container Registry:"
          echo "📦 ghcr.io/${{ github.repository_owner }}/trustpoint:${{ steps.get_version.outputs.version }}"
          echo "📦 ghcr.io/${{ github.repository_owner }}/trustpoint-postgres:${{ steps.get_version.outputs.version }}"
