# .github/workflows/backup-restore.yml
name: Tests / Backup & Restore

on:
  workflow_call:

jobs:
  backup-and-restore:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      TRUSTPOINT_PHASE: operational
      TRUSTPOINT_OPERATIONAL_DATABASE: postgresql
      DATABASE_ENGINE: django.db.backends.postgresql
      POSTGRES_DB: trustpoint_db
      DATABASE_USER: admin
      DATABASE_PASSWORD: testing321
      DATABASE_HOST: localhost
      DATABASE_PORT: "5432"
      TRUSTPOINT_AUTO_CONFIGURE_LOCAL_SOFTWARE_BACKEND: "true"

    steps:
      - name: Install system tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ca-certificates curl gettext gnupg
          curl -fSsL https://www.postgresql.org/media/keys/ACCC4CF8.asc \
            | sudo gpg --dearmor -o /usr/share/keyrings/postgresql-archive-keyring.gpg
          . /etc/os-release
          echo "deb [signed-by=/usr/share/keyrings/postgresql-archive-keyring.gpg] http://apt.postgresql.org/pub/repos/apt/ ${VERSION_CODENAME}-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install -y postgresql-client-18
          /usr/lib/postgresql/18/bin/pg_restore --version
      
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup .env file
        run: cp .env.example .env

      - name: Build and start PostgreSQL
        run: |
          docker build -t trustpointproject/postgres:latest -f docker/db/Dockerfile .
          docker run -d --name postgres -p 5432:5432 -e POSTGRES_USER=admin -e POSTGRES_PASSWORD=testing321 -e POSTGRES_DB=trustpoint_db trustpointproject/postgres:latest

      - name: Set up uv environment
        uses: ./.github/actions/setup-uv-action

      - name: Initialize database schema
        run: 
          uv run trustpoint/manage.py inittrustpoint --tls --admin

      - name: Populate test data
        run: |
          uv run trustpoint/manage.py add_domains_and_devices

      - name: Build and start Trustpoint container
        run: |
          docker build -t trustpointproject/trustpoint:latest -f docker/trustpoint/Dockerfile .
          docker run -d --name trustpoint --link postgres -p80:80 -p443:443 \
            -e TRUSTPOINT_PHASE=operational \
            -e TRUSTPOINT_OPERATIONAL_DATABASE=postgresql \
            -e POSTGRES_DB=trustpoint_db \
            -e DATABASE_USER=admin \
            -e DATABASE_PASSWORD=testing321 \
            -e DATABASE_HOST=postgres \
            -e DATABASE_PORT=5432 \
            trustpointproject/trustpoint:latest
      
      - name: Validate implicit restoration
        run: ./tests/scripts/test_successfull_restoration.sh

      - name: Create backup (from inside container)
        run: docker exec trustpoint sh -c "uv run trustpoint/manage.py trustpointbackup --filename from_outside.dump.gz"

      - name: Download backup artifact
        run: |
          docker cp trustpoint:/var/www/html/trustpoint/trustpoint/media/backups/from_outside.dump.gz .
          docker cp trustpoint:/var/www/html/trustpoint/trustpoint/media/backups/from_outside.dump.gz.manifest.json .

      - name: Remove Trustpoint container
        run: docker rm -f trustpoint

      - name: Reset database
        run: uv run trustpoint/manage.py reset_db --force --no-user --keep-all-migrations

      - name: Stage backup for host-side restore
        run: |
          mkdir -p trustpoint/media/backups
          cp from_outside.dump.gz trustpoint/media/backups/
          cp from_outside.dump.gz.manifest.json trustpoint/media/backups/

      - name: Verify backup manifest
        run: uv run trustpoint/manage.py trustpointbackup_manifest --filename from_outside.dump.gz --verify

      - name: Restore database from host
        run: |
          export PATH="/usr/lib/postgresql/18/bin:$PATH"
          uv run trustpoint/manage.py dbrestore -z --noinput -I trustpoint/media/backups/from_outside.dump.gz

      - name: Start restored Trustpoint container
        run: |
          docker run -d --name trustpoint --link postgres -p80:80 -p443:443 \
            -e TRUSTPOINT_PHASE=operational \
            -e TRUSTPOINT_OPERATIONAL_DATABASE=postgresql \
            -e POSTGRES_DB=trustpoint_db \
            -e DATABASE_USER=admin \
            -e DATABASE_PASSWORD=testing321 \
            -e DATABASE_HOST=postgres \
            -e DATABASE_PORT=5432 \
            trustpointproject/trustpoint:latest

      - name: Validate post-restore deployment
        run: ./tests/scripts/test_successfull_restoration.sh
