name: Pytest

# Trigger this workflow on pull requests to ensure tests are executed before merging.
on:
  pull_request:
  push:
    branches:
      - main

jobs:
  pytest:
    runs-on: ubuntu-latest  # Use the latest Ubuntu runner for compatibility and performance.

    permissions:
      contents: read  # Grants read access to repository contents.
      pull-requests: write  # Allows posting test reports as comments on pull requests.

    steps:
      - name: Checkout Code
        uses: actions/checkout@v7  # Ensures the repository code is available.

      - name: Setup uv environment
        uses: ./.github/actions/setup-uv-action  # Call the reusable setup step.
        with:
          run_migrations: true  # Enable database migrations.

      - name: Run Pytest and create reports
        id: pytest
        continue-on-error: true  # Allows workflow to continue even if tests fail.
        run: |
          mkdir -p reports
          uv run pytest \
          --md-report-flavor github \
          --md-report \
          --html=reports/pytest-report.html \
          --junitxml=reports/junit-report.xml \
          trustpoint/ 

      - name: Create report for failed tests
        if: steps.pytest.outcome == 'failure'
        run: |
          echo "## ❌ Test Failures Detected" > pr-comment.md
          echo "" >> pr-comment.md
          cat "md-report.md" >> pr-comment.md

      - name: Create report for successful tests
        if: steps.pytest.outcome == 'success'
        run: |
          echo "## ✅ All Tests Passed Successfully" > pr-comment.md
          echo "" >> pr-comment.md
          echo "All tests executed successfully. No issues detected." >> pr-comment.md

      - name: Display Summary in GitHub Actions
        if: always()  # Ensures this step runs even if pytest fails.
        run: |
          if [ -f "pr-comment.md" ]; then
            echo "<details><summary>Pytest Report</summary>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            cat "pr-comment.md" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "</details>" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload Test Reports even if tests fail
        uses: actions/upload-artifact@v7  # Uploads reports for review.
        if: always()  # Ensures this step runs even if pytest fails.
        with:
          name: pytest-reports
          path: reports/

      - name: Render the report to the PR
        uses: marocchino/sticky-pull-request-comment@v3  # Posts test results as a comment on PRs.
        if: always()  # Always runs.
        with:
          header: test-report
          recreate: true  # Replaces previous test reports to keep PR comments clean.
          path: pr-comment.md  # Posts the custom report in the PR.

      - name: Fail workflow if tests failed
        if: steps.pytest.outcome == 'failure'
        run: exit 1  # Ensures the workflow fails if tests failed.
