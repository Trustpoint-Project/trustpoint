name: Docker Compose Auto-Setup Test

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test-auto-setup:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup .env file with auto-setup enabled
        run: |
          cp .env.example .env
          echo "" >> .env
          echo "TP_AUTO_SETUP=true" >> .env
          echo "TP_ADMIN_USERNAME=admin" >> .env
          echo "TP_ADMIN_PASSWORD=testing321" >> .env
          echo "TP_INJECT_DEMO_DATA=true" >> .env

      - name: Run Docker compose
        uses: hoverkraft-tech/compose-action@v3.0.0
        with:
          compose-file: "./docker-compose.yml"
          up-flags: "--build --wait --wait-timeout 180"

      - name: Wait for services to be fully ready
        run: |
          echo "Waiting for Trustpoint to complete auto-setup..."
          
          setup_complete=false
          for i in {1..60}; do
            if docker compose ps trustpoint | grep -q "healthy"; then
              echo "✅ Trustpoint container is healthy (attempt $i)"
              
              if docker compose logs trustpoint 2>&1 | grep -q "Auto-setup completed successfully\|Trustpoint startup complete\|Application startup complete"; then
                echo "✅ Auto-setup process completed"
                setup_complete=true
                break
              elif docker compose exec -T postgres psql -U admin -d trustpoint_db -c "\dt auth_user" 2>&1 | grep -q "auth_user"; then
                echo "✅ Database migrations completed (auth_user table exists)"
                setup_complete=true
                break
              else
                echo "⏳ Container healthy but setup still in progress..."
              fi
            else
              echo "⏳ Waiting for container to be healthy (attempt $i/60)..."
            fi
            sleep 3
          done
          
          if [ "$setup_complete" = false ]; then
            echo "⚠️ Auto-setup may not have completed within timeout"
          fi
          
          echo ""
          echo "Container status:"
          docker compose ps
          
          echo ""
          echo "Recent container logs:"
          docker compose logs --tail=100 trustpoint

      - name: Test 1 - Check HTTPS endpoint is accessible
        run: |
          echo "## Test 1: HTTPS Endpoint" >> "$GITHUB_STEP_SUMMARY"
          
          URL="https://127.0.0.1/"
          
          for i in {1..20}; do
            http_response=$(curl -k -L -s -o response.txt -w "%{http_code}" "$URL") || true
            
            if [ "$http_response" = "200" ]; then
              echo "✅ HTTPS endpoint accessible on attempt $i" | tee -a "$GITHUB_STEP_SUMMARY"
              break
            else
              echo "⏳ Attempt $i failed with HTTP code $http_response, retrying..."
              sleep 3
            fi
          done
          
          if [ "$http_response" != "200" ]; then
            echo "❌ HTTPS endpoint test failed" | tee -a "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

      - name: Test 2 - Verify auto-setup bypassed wizard
        run: |
          echo "## Test 2: Auto-Setup Verification" >> "$GITHUB_STEP_SUMMARY"
          
          response=$(curl -k -L -s "https://127.0.0.1/")
          
          if echo "$response" | grep -q "setup wizard" || echo "$response" | grep -q "initial setup"; then
            echo "❌ Setup wizard still present - auto-setup may have failed" | tee -a "$GITHUB_STEP_SUMMARY"
            exit 1
          else
            echo "✅ Auto-setup successfully bypassed wizard" | tee -a "$GITHUB_STEP_SUMMARY"
          fi

      - name: Test 2b - Verify database migrations and admin user
        run: |
          echo "## Test 2b: Database & Admin User Verification" >> "$GITHUB_STEP_SUMMARY"
          
          echo "Checking if database tables exist..." | tee -a "$GITHUB_STEP_SUMMARY"
          tables=$(docker compose exec -T postgres psql -U admin -d trustpoint_db \
            -c "\dt" -t 2>&1 || echo "ERROR")
          
          if echo "$tables" | grep -q "auth_user"; then
            echo "✅ Database migrations have run" | tee -a "$GITHUB_STEP_SUMMARY"
            
            db_check=$(docker compose exec -T postgres psql -U admin -d trustpoint_db \
              -c "SELECT username, is_superuser, is_staff FROM auth_user WHERE username='admin';" -t 2>&1 || echo "")
            
            echo "Admin user query result: $db_check" | tee -a "$GITHUB_STEP_SUMMARY"
            
            if echo "$db_check" | grep -q "admin"; then
              echo "✅ Admin user exists in database" | tee -a "$GITHUB_STEP_SUMMARY"
            else
              echo "❌ Admin user not found in database" | tee -a "$GITHUB_STEP_SUMMARY"
              echo "All users in database:" | tee -a "$GITHUB_STEP_SUMMARY"
              docker compose exec -T postgres psql -U admin -d trustpoint_db \
                -c "SELECT id, username, is_superuser, is_staff FROM auth_user;" | tee -a "$GITHUB_STEP_SUMMARY"
            fi
          else
            echo "❌ Database migrations have NOT run - auth_user table missing" | tee -a "$GITHUB_STEP_SUMMARY"
            echo "Available tables:" | tee -a "$GITHUB_STEP_SUMMARY"
            echo "$tables" | tee -a "$GITHUB_STEP_SUMMARY"
            echo "" | tee -a "$GITHUB_STEP_SUMMARY"
            echo "Container logs (last 100 lines):" | tee -a "$GITHUB_STEP_SUMMARY"
            docker compose logs --tail=100 trustpoint | tee -a "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

      - name: Test 3 - Admin login and session creation
        run: |
          echo "## Test 3: Admin Login" >> "$GITHUB_STEP_SUMMARY"
          
          csrf_token=$(curl -k -s -c cookies.txt "https://127.0.0.1/accounts/login/" | grep -oP 'name="csrfmiddlewaretoken" value="\K[^"]+' || echo "")
          
          if [ -z "$csrf_token" ]; then
            echo "⚠️  Could not extract CSRF token, trying alternative method..."
            csrf_token=$(curl -k -s -c cookies.txt "https://127.0.0.1/accounts/login/" | grep csrfmiddlewaretoken | grep -oP 'value="\K[^"]+' | head -1)
          fi
          
          echo "CSRF Token extracted: ${csrf_token:0:10}..." | tee -a "$GITHUB_STEP_SUMMARY"
          
          login_response=$(curl -k -L -s -b cookies.txt -c cookies.txt \
            -w "%{http_code}" -o login_response.txt \
            -d "username=admin" \
            -d "password=testing321" \
            -d "csrfmiddlewaretoken=$csrf_token" \
            -H "Referer: https://127.0.0.1/accounts/login/" \
            "https://127.0.0.1/accounts/login/")
          
          echo "Login response code: $login_response" | tee -a "$GITHUB_STEP_SUMMARY"
          
          if grep -q "sessionid" cookies.txt && ! grep -q "Login" login_response.txt; then
            echo "✅ Admin login successful" | tee -a "$GITHUB_STEP_SUMMARY"
          else
            echo "❌ Admin login failed" | tee -a "$GITHUB_STEP_SUMMARY"
            echo "Cookies:" | tee -a "$GITHUB_STEP_SUMMARY"
            cat cookies.txt | tee -a "$GITHUB_STEP_SUMMARY"
            echo "" | tee -a "$GITHUB_STEP_SUMMARY"
            echo "Response body (first 500 chars):" | tee -a "$GITHUB_STEP_SUMMARY"
            head -c 500 login_response.txt | tee -a "$GITHUB_STEP_SUMMARY"
            echo "" | tee -a "$GITHUB_STEP_SUMMARY"
            echo "Checking container logs for errors:" | tee -a "$GITHUB_STEP_SUMMARY"
            docker compose logs --tail=30 trustpoint | tee -a "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

      - name: Test 4 - Access authenticated dashboard
        run: |
          echo "## Test 4: Authenticated Dashboard Access" >> "$GITHUB_STEP_SUMMARY"
          
          dashboard_response=$(curl -k -s -b cookies.txt -w "%{http_code}" -o dashboard.txt \
            "https://127.0.0.1/")
          
          if [ "$dashboard_response" = "200" ]; then
            echo "✅ Dashboard accessible with authenticated session" | tee -a "$GITHUB_STEP_SUMMARY"
          else
            echo "❌ Dashboard access failed with code $dashboard_response" | tee -a "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

      - name: Test 5 - Check demo data injection
        run: |
          echo "## Test 5: Demo Data Verification" >> "$GITHUB_STEP_SUMMARY"
          
          demo_check=$(curl -k -s -b cookies.txt "https://127.0.0.1/" | grep -i "demo" || echo "")
          
          if [ -n "$demo_check" ]; then
            echo "✅ Demo data appears to be injected" | tee -a "$GITHUB_STEP_SUMMARY"
          else
            echo "ℹ️  Demo data check inconclusive (depends on UI)" | tee -a "$GITHUB_STEP_SUMMARY"
          fi

      - name: Test 6 - Check container logs for errors
        if: always()
        run: |
          echo "## Test 6: Container Logs Check" >> "$GITHUB_STEP_SUMMARY"
          
          echo "### Trustpoint Container Logs (last 50 lines):" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          docker compose logs --tail=50 trustpoint >> "$GITHUB_STEP_SUMMARY" || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          
          if docker compose logs trustpoint | grep -i "error\|exception\|failed" | grep -v "Failed password" | grep -v "DEBUG"; then
            echo "⚠️  Potential errors found in logs" | tee -a "$GITHUB_STEP_SUMMARY"
          else
            echo "✅ No critical errors in container logs" | tee -a "$GITHUB_STEP_SUMMARY"
          fi

      - name: Test 7 - Verify database initialization
        run: |
          echo "## Test 7: Database Initialization" >> "$GITHUB_STEP_SUMMARY"
          
          db_check=$(docker compose exec -T postgres psql -U admin -d trustpoint_db \
            -c "SELECT COUNT(*) FROM auth_user WHERE username='admin';" -t || echo "0")
          
          if [ $(echo "$db_check" | tr -d ' ') -ge 1 ]; then
            echo "✅ Admin user found in database" | tee -a "$GITHUB_STEP_SUMMARY"
          else
            echo "❌ Admin user not found in database" | tee -a "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

      - name: Cleanup
        if: always()
        run: |
          docker compose down -v
