{% load i18n %}

<div class="card">
    <div class="card-header"><h5 class="mb-0">{% trans "Log Configuration" %}</h5></div>
    <div class="card-body pt-4 pb-4">
        <form method="POST" action="{% url 'management:settings-logging' %}" id="loglevel_configuration">
            {% csrf_token %}
            <fieldset class="form-group tp-form-group">
                <div class="mb-3">
                    {{ form.loglevel.label_tag }}
                    {{ form.loglevel }}
                </div>
                <div class="form-check form-switch mb-2">
                    {{ form.crypto_backend_audit_enabled }}
                    <label class="form-check-label" for="{{ form.crypto_backend_audit_enabled.id_for_label }}">
                        {{ form.crypto_backend_audit_enabled.label }}
                    </label>
                </div>
                {% if form.crypto_backend_audit_enabled.help_text %}
                    <div class="form-text">{{ form.crypto_backend_audit_enabled.help_text }}</div>
                {% endif %}
            </fieldset>
        </form>
    </div>
    <div class="card-footer d-flex justify-content-between tp-sticky-footer">
        <div class="tp-card-btn-footer m-1">
            <button class="btn btn-primary" type="submit" form="loglevel_configuration">{% trans "Save" %}</button>
        </div>
    </div>
</div>
