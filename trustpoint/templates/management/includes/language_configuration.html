{% load i18n %}

<div class="card">
    <div class="card-header"><h5 class="mb-0">{% trans "Language Configuration" %}</h5></div>
    <div class="card-body pt-4 pb-4">
        <form method="POST" action="{% url 'management:settings-language' %}" enctype="multipart/form-data" id="language_configuration">
            {% csrf_token %}
            <fieldset class="form-group tp-form-group">
                {{ form.language }}
            </fieldset>
        </form>
    </div>
    <div class="card-footer d-flex justify-content-between tp-sticky-footer">
        <div class="tp-card-btn-footer m-1">
            <button class="btn btn-primary" type="submit" form="language_configuration">{% trans "Save" %}</button>
        </div>
    </div>
</div>
