<style>
.timezone-select-wrapper {
    position: relative;
    max-width: 100%;
    max-width: 672px;
}

.timezone-select-toggle {
    text-align: left;
}

.timezone-select-toggle::after {
    display: none;
}

.timezone-dropdown-menu {
    display: none;
    position: absolute;
    top: calc(100% + 4px);
    left: 0;
    right: 0;
    z-index: 1050;
    border: 1px solid var(--bs-border-color);
    border-radius: var(--bs-border-radius, 0.375rem);
    background: var(--bs-body-bg);
    box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.15);
    overflow: hidden;
}

.timezone-dropdown-menu.show {
    display: block;
}

.timezone-search-box {
    padding: 0.5rem;
    border-bottom: 1px solid var(--bs-border-color);
}

.timezone-options {
    max-height: 240px;
    overflow-y: auto;
}

.timezone-option {
    display: block;
    width: 100%;
    text-align: left;
    border: 0;
    background: transparent;
    color: inherit;
    padding: 0.625rem 0.75rem;
    cursor: pointer;
}

.timezone-option:hover,
.timezone-option:focus {
    background: rgba(255, 255, 255, 0.08);
}

.timezone-option.hidden {
    display: none;
}
</style>

<script>
//Code erst ausführen wenn alles geladen ist
document.addEventListener("DOMContentLoaded", function () {
    // Elemente holen
    const wrapper = document.querySelector(".timezone-select-wrapper");
    const toggle = document.getElementById("timezone-select-toggle");
    const menu = document.getElementById("timezone-dropdown-menu");
    const search = document.getElementById("timezone-search");
    const hiddenInput = document.getElementById("selected-timezone");
    const label = document.getElementById("timezone-selected-label");
    const options = document.querySelectorAll(".timezone-option");
    // Dropdown öffnen und schließen
    toggle.addEventListener("click", function (event) {
        event.stopPropagation();
        menu.classList.toggle("show");
        toggle.setAttribute("aria-expanded", menu.classList.contains("show"));

        if (menu.classList.contains("show")) {
            setTimeout(() => search.focus(), 0);
        }
    });
    // Das verhindert, dass ein Klick ins Input-Feld als Außenklick behandelt wird.
    search.addEventListener("click", function (event) {
        event.stopPropagation();
    });
    // Filtern der Optionen
    search.addEventListener("input", function () {
        const value = search.value.trim().toLowerCase();

        options.forEach(option => {
            const text = option.textContent.toLowerCase();
            option.classList.toggle("hidden", !text.includes(value));
        });
    });
    // Das ist der Teil, der aus einem Klick wirklich eine Auswahl macht.
    options.forEach(option => {
        option.addEventListener("click", function () {
            const value = this.dataset.value;
            hiddenInput.value = value;
            label.textContent = value;

            menu.classList.remove("show");
            toggle.setAttribute("aria-expanded", "false");
            search.value = "";

            options.forEach(opt => opt.classList.remove("hidden"));
        });
    });
    // Klick außerhalb schließt das Menü
    document.addEventListener("click", function (event) {
        if (!wrapper.contains(event.target)) {
            menu.classList.remove("show");
            toggle.setAttribute("aria-expanded", "false");
        }
    });
});
</script>
