{% extends 'trustpoint/base.html' %}
{% load static i18n %}

{% block content %}
<div class="card" style="max-height: 100%; display: flex; flex-direction: column;">
    <div class="card-header">
        <h1>{% trans 'Role Management' %}</h1>
    </div>

    {# --- Main table --- #}
    <div class="card-body text-start pt-0" style="overflow: auto; flex-grow: 1; max-height: 90%;">
        {% include 'management/role_management_table.html' %}
    </div>

    {# --- Footer actions --- #}
    <div class="card-footer d-flex flex-column flex-md-row justify-content-end tp-sticky-footer">
        <div class="m-1 d-flex flex-wrap justify-content-md-end gap-2">
            <a class="btn btn-primary" href="{% url 'management:add_role' %}">{% trans "Add Role" %}</a>
        </div>
    </div>
</div>
{% endblock %}
