{% extends 'trustpoint/base.html' %}
{% load i18n %}

{% block content %}
<div class="card tp-card-centered">
    <div class="card-header">
        <h2>{% trans 'Issued Certificates for' %} {{ issuing_ca.unique_name }}</h2>
    </div>

    <div class="card-body text-start" style="overflow: auto; flex-grow: 1; max-height: 90%">
        {% include 'pki/certificates/table.html' with certificates=issued_certificates %}
    </div>

    <div class="card-footer">
        <button type="button" class="btn btn-secondary" onclick="history.back()">{% trans 'Back' %}</button>
    </div>
</div>
{% endblock content %}
