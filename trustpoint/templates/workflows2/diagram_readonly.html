{% extends "trustpoint/base.html" %}
{% load static %}

{% block head %}
  {{ block.super }}
  <link rel="stylesheet" href="{% static 'css/workflows2_editor.css' %}">
{% endblock head %}

{% block content %}
<div class="container-fluid py-3">
  <div class="d-flex align-items-center justify-content-between mb-3">
    <div>
      <h3 class="mb-0">Workflow Diagram (read-only)</h3>
      <div class="text-muted small">Definition: {{ definition_id }}</div>
    </div>
    <div class="d-flex gap-2">
      <button id="wf2-zoom-fit" class="btn btn-outline-secondary btn-sm" type="button">Fit</button>
      <button id="wf2-reload" class="btn btn-outline-secondary btn-sm" type="button">Reload</button>
    </div>
  </div>

  <div class="card">
    <div class="card-body p-0">
      <div
        id="wf2-canvas"
        data-graph-url="{{ graph_url|escapejs }}"
        class="wf2-diagram-canvas"
      ></div>
    </div>
  </div>

  <div class="mt-2 text-muted small">
    Data source: <code>{{ graph_url }}</code>
  </div>
</div>

<script defer src="{% static 'js/workflows2/diagram_readonly_bootstrap.js' %}"></script>
<script src="{% static 'js/workflow2/dist/workflows2-diagram.bundle.js' %}"></script>
{% endblock %}
