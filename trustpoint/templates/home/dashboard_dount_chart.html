{% load static %}
<div class="card rounded-5 position-relative donut-chart-card-container">
  <div class="card-body">
    <h6 class="mb-3 fs-5">{{ title }}</h6>

    <div class="position-relative donut-chart-container">
      <canvas id="chart_dount_{{ identifier }}"></canvas>
    </div>
  </div>
</div>

<script>
  document.addEventListener('DOMContentLoaded', function() {
    initializeDonutChart('{{ identifier }}', '{{ dataset }}', '{{ chartTitle }}');
  });
</script>
